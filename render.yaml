services:
  - type: web
    name: sui-paylink
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: HOST
        value: 0.0.0.0
      - key: SERVE_WEB_APP
        value: "true"
      - key: PAYLINK_STORE_PATH
        value: /tmp/suipaylink-paylinks.json
      - key: SPONSORED_TRANSACTION_STORE_PATH
        value: /tmp/suipaylink-sponsored-transactions.json
      - key: PUBLIC_BASE_URL
        sync: false
