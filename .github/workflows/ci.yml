name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: API smoke
        run: npm run smoke:api

      - name: Production preview smoke
        run: npm run smoke:preview

      - name: Static demo smoke
        run: npm run smoke:static-demo

      - name: Cloudflare static demo smoke
        run: npm run smoke:cloudflare-demo
